<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Green Glass UI</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;

    background: linear-gradient(-45deg,
      #064e3b,
      #065f46,
      #10b981,
      #22c55e,
      #16a34a
    );

    background-size: 400% 400%;
    animation: greenFlow 12s ease infinite;

    display: flex;
    justify-content: center;
    align-items: center;
  }

  @keyframes greenFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* GLASS LAYER (BELOW SURVEY) */
  .glass-bg {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.4); /* 60% transparent */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 1;
  }

  /* SURVEY CONTAINER (ABOVE GLASS) */
  .survey {
    position: relative;
    z-index: 2;

    width: 400px;
    padding: 20px;

    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 16px;

    color: white;
  }
</style>
</head>
<body>
<input id="desc" placeholder="Description">
<input id="amount" placeholder="Amount">
<select id="type">
  <option>Income</option>
  <option>Expense</option>
</select>

<button onclick="submitData()">Submit</button>

<script>
function submitData() {
  const formData = new FormData();

  formData.append("name", document.getElementById("desc").value);
  formData.append("amount", document.getElementById("amount").value);
  formData.append("type", document.getElementById("type").value);

  fetch("https://script.google.com/macros/s/AKfycbyBO0SZN1c-kIU3sqQ_reO3xYC1A2IM2djTzsBaHikljqOmWcxolIz_nq8MCuT9rj_u/exec", {
    method: "POST",
    body: formData,
mode: "no-cors"
  });

  alert("Submitted!");
}</script>
<div class="glass-bg"></div>

<div class="survey">
  <h2>Survey</h2>
  <p>This sits above the glass layer.</p>
</div>

</body>
</html>
