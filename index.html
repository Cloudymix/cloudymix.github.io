<!DOCTYPE html>
<html>
<body>
<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;

  /* base gradient */
  background: linear-gradient(135deg, #b7ff00, #2c3e50, #000000);
  overflow: hidden;
}

/* overlay pattern (gives texture like your image) */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.2), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,0,0,0.4), transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,0.1), transparent 60%);

  opacity: 0.6;
  pointer-events: none;
}

/* optional “grain” texture */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: url("https://www.transparenttextures.com/patterns/noise.png");
  opacity: 0.08;
  pointer-events: none;
}
</style>
<input id="desc" placeholder="Description">
<input id="amount" placeholder="Amount">
<select id="type">
  <option>Income</option>
  <option>Expense</option>
</select>

<button onclick="submitData()">Submit</button>

<script>
function submitData() {
  const formData = new FormData();

  formData.append("name", document.getElementById("desc").value);
  formData.append("amount", document.getElementById("amount").value);
  formData.append("type", document.getElementById("type").value);

  fetch("https://script.google.com/macros/s/AKfycbyBO0SZN1c-kIU3sqQ_reO3xYC1A2IM2djTzsBaHikljqOmWcxolIz_nq8MCuT9rj_u/exec", {
    method: "POST",
    body: formData,
mode: "no-cors"
  });

  alert("Submitted!");
}</script>

</body>
</html>
