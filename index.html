<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finance Tracker</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;

    background: linear-gradient(-45deg,
      #064e3b,
      #065f46,
      #10b981,
      #22c55e,
      #16a34a
    );

    background-size: 400% 400%;
    animation: greenFlow 12s ease infinite;

    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  @keyframes greenFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* glass layer behind form */
  .glass-bg {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4); /* 60% transparent */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 1;
  }

  /* FORM CARD (Google Forms style) */
  .form-card {
    position: relative;
    z-index: 2;
    width: 420px;

    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    overflow: hidden;
  }

  .header {
    background: #0f9d58;
    color: white;
    padding: 18px 20px;
  }

  .header h2 {
    margin: 0;
    font-size: 18px;
  }

  .header p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.9;
  }

  .body {
    padding: 20px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field input,
  .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #dadce0;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
  }

  .field input:focus,
  .field select:focus {
    border-color: #0f9d58;
    box-shadow: 0 0 0 2px rgba(15,157,88,0.15);
  }

  button {
    width: 100%;
    padding: 10px;
    background: #0f9d58;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #0b7d46;
  }
</style>
</head>

<body>

<div class="glass-bg"></div>

<div class="form-card">

  <div class="header">
    <h2>Finance Tracker</h2>
    <p>Log your income or expenses</p>
  </div>

  <div class="body">

    <div class="field">
      <input id="desc" placeholder="Description">
    </div>

    <div class="field">
      <input id="amount" placeholder="Amount" type="number">
    </div>

    <div class="field">
      <select id="type">
        <option>Income</option>
        <option>Expense</option>
      </select>
    </div>

    <button onclick="submitData()">Submit</button>

  </div>
</div>

<script>
function submitData() {
  const formData = new FormData();

  formData.append("name", document.getElementById("desc").value);
  formData.append("amount", document.getElementById("amount").value);
  formData.append("type", document.getElementById("type").value);

  fetch("https://script.google.com/macros/s/AKfycbyBO0SZN1c-kIU3sqQ_reO3xYC1A2IM2djTzsBaHikljqOmWcxolIz_nq8MCuT9rj_u/exec", {
    method: "POST",
    body: formData,
    mode: "no-cors"
  });

  alert("Submitted!");
}
</script>

</body>
</html>
