<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12THOMPSON_FINANCE</title>

<style> 
 html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
  }
    
body {
    margin: 0;
    height: 100vh;
    font-family: 'Figtree', sans-serif;
text-align:center;

    background: linear-gradient(-45deg,
      #064e3b,
      #065f46,
      #10b981,
      #22c55e,
      #16a34a
    );

    background-size: 400% 400%;
    animation: greenFlow 12s ease infinite;

    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  @keyframes greenFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* glass layer */
  .glass-bg {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 1;
  }

@keyframes popIn {
    0% {
      opacity: 0;
      transform: scale(0.85);
    }
    60% {
      opacity: 1;
      transform: scale(1.03);
    }
    100% {
      transform: scale(1);
    }
  }


  /* FORM CARD */
  .form-card {
    position: relative;
    z-index: 2;
    width: 420px;

    background: #fff;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    overflow: hidden;
  }

  .header {
    background: #0f9d58;
    color: white;
    padding: 18px 20px;
  }

  .header h2 {
    margin: 0;
    font-size: 18px;
  }

  .header p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.9;
  }

  .body {
    padding: 20px;
  }

  .field {
    margin-bottom: 16px;
  }

  /* ✅ FIXED INPUT ISSUE HERE */
  .field input,
  .field select {
    width: 100%;
    box-sizing: border-box;

    padding: 11px 12px;

    border: 1px solid #dadce0;
    border-radius: 8px;

    font-size: 14px;
font-family: 'Figtree', sans-serif;
    outline: none;

    background: #fff;

    transition: 0.2s;
  }

  .field input:focus,
  .field select:focus {
    border-color: #0f9d58;
    box-shadow: 0 0 0 2px rgba(15,157,88,0.15);
  }

 .page-footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;

    font-size: 15px;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 0.3px;

font-weight: bold;
font-style: italic;

    z-index: 3;
  }

  button {
    width: 100%;
    padding: 10px;

    background: #0f9d58;
    color: white;

    border: none;
    border-radius: 8px;

font-family: 'Figtree', sans-serif;    
font-size: 14px;
    cursor: pointer;

    transition: 0.2s;
  }

  button:hover {
    background: #0b7d46;
  }

 @media (max-width: 600px) {
    .form-card {
      width: 92%;
    }

    .body {
      padding: 16px;
    }

    .header h2 {
      font-size: 16px;
    }
  }
    
</style>
</head>

<body>

<div class="glass-bg"></div>

<div class="form-card">

  <div class="header">
    <h2>Finance Tracker</h2>
    <p>List down incomes and expenses here.</p>
  </div>

  <div class="body">

    <div class="field">
      <input id="desc" placeholder="Description">
    </div>

    <div class="field">
      <input id="amount" placeholder="Amount" type="number">
    </div>

    <div class="field">
      <select id="type">
        <option>Income</option>
        <option>Expense</option>
      </select>
    </div>

    <button onclick="submitData()">Submit</button>

  </div>
</div>
<div class="page-footer">
made by 12 thomson !! :33
</div>
<script>
function submitData() {
  const formData = new FormData();

  formData.append("name", document.getElementById("desc").value);
  formData.append("amount", document.getElementById("amount").value);
  formData.append("type", document.getElementById("type").value);

  fetch("https://script.google.com/macros/s/AKfycbyBO0SZN1c-kIU3sqQ_reO3xYC1A2IM2djTzsBaHikljqOmWcxolIz_nq8MCuT9rj_u/exec", {
    method: "POST",
    body: formData,
    mode: "no-cors"
  });

  alert("Submitted!");
}
</script>


</body></html>
