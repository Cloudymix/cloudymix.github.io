<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

* {
  font-family: 'Figtree', sans-serif;
}

body {
  width: 100vw;
  height: 100vh;
  background: linear-gradient(-45deg, #064e3b, #065f46, #10b981, #22c55e, #16a34a);
  background-size: 400% 400%;
  animation: greenFlow 25s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
text-align: center;
}

@keyframes greenFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.dots {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0.25;
  background-image: radial-gradient(circle, rgba(0,0,0,0.6) 2px, transparent 2px);
  background-size: 18px 18px;
  animation: moveDots 6s linear infinite;
}

@keyframes moveDots {
  0% { background-position: 0 0; }
  100% { background-position: 30px 30px; }
}

.glass-bg {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 1;
}

@keyframes popIn {
  0% { opacity: 0; transform: scale(0.85); }
  60% { opacity: 1; transform: scale(1.03); }
  100% { transform: scale(1); }
}

.form-card {
  position: relative;
  z-index: 3;
  width: 420px;
  max-width: 92%;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  overflow: hidden;
  animation: popIn 1.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.header {
  background: #0f9d58;
  color: white;
  padding: 18px 20px;
}

.header h2 {
  margin: 0;
  font-size: 18px;
}

.header p {
  margin: 4px 0 0;
  font-size: 13px;
  opacity: 0.9;
}

.body {
  padding: 20px;
}

.field {
  margin-bottom: 16px;
}

.field input,
.field select {
  width: 100%;
  box-sizing: border-box;
  padding: 11px 12px;
  border: 1px solid #dadce0;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
}

.field input:focus,
.field select:focus {
  border-color: #0f9d58;
  box-shadow: 0 0 0 2px rgba(15,157,88,0.15);
}

button {
  width: 100%;
  padding: 10px;
  background: #0f9d58;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #0b7d46;
}

.page-footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 15px;
font-weight: bold;
    font-style: italic;
    
  color: rgba(255,255,255,0.6);
  z-index: 4;
}
</style>
</head>

<body>

<div class="dots"></div>
<div class="glass-bg"></div>

<div class="form-card">
  <div class="header">
    <h2>Finance Tracker</h2>
    <p>Log your income or expenses</p>
  </div>

  <div class="body">
    <div class="field">
      <input id="desc" placeholder="Description">
    </div>

    <div class="field">
      <input id="amount" placeholder="Amount" type="number">
    </div>

    <div class="field">
      <select id="type">
        <option>Income</option>
        <option>Expense</option>
      </select>
    </div>

    <button onclick="submitData()">Submit</button>
  </div>
</div>

<div class="page-footer">
  made by 12 thomson !! :33
</div>

<script>
function submitData() {
  const formData = new FormData();

  formData.append("name", document.getElementById("desc").value);
  formData.append("amount", document.getElementById("amount").value);
  formData.append("type", document.getElementById("type").value);

  fetch("https://script.google.com/macros/s/AKfycbyBO0SZN1c-kIU3sqQ_reO3xYC1A2IM2djTzsBaHikljqOmWcxolIz_nq8MCuT9rj_u/exec", {
    method: "POST",
    body: formData,
    mode: "no-cors"
  });

  alert("Submitted!");
}
</script>


</body></html>
