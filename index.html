<!DOCTYPE html>
<html>
<body>
<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;

    background: linear-gradient(-45deg,
      #064e3b,
      #065f46,
      #10b981,
      #22c55e,
      #16a34a
    );

    background-size: 400% 400%;
    animation: greenFlow 12s ease infinite;
    font-family: Arial, sans-serif;
  }

  @keyframes greenFlow {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }

  /* optional subtle glow overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, rgba(34,197,94,0.18), transparent 60%);
    pointer-events: none;
  }
</style>

<input id="desc" placeholder="Description">
<input id="amount" placeholder="Amount">
<select id="type">
  <option>Income</option>
  <option>Expense</option>
</select>

<button onclick="submitData()">Submit</button>

<script>
function submitData() {
  const formData = new FormData();

  formData.append("name", document.getElementById("desc").value);
  formData.append("amount", document.getElementById("amount").value);
  formData.append("type", document.getElementById("type").value);

  fetch("https://script.google.com/macros/s/AKfycbyBO0SZN1c-kIU3sqQ_reO3xYC1A2IM2djTzsBaHikljqOmWcxolIz_nq8MCuT9rj_u/exec", {
    method: "POST",
    body: formData,
mode: "no-cors"
  });

  alert("Submitted!");
}</script>

</body>
</html>
